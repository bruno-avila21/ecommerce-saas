server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip para archivos estáticos
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # Proxy /api/* → backend en Cloud Run
    # BACKEND_URL se reemplaza en el script de deploy con la URL real
    location /api/ {
        proxy_pass        BACKEND_PLACEHOLDER/api/;
        proxy_set_header  Host              $proxy_host;
        proxy_set_header  X-Real-IP         $remote_addr;
        proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Proxy /uploads/* → backend (imágenes)
    location /uploads/ {
        proxy_pass        BACKEND_PLACEHOLDER/uploads/;
        proxy_set_header  Host              $proxy_host;
        proxy_cache_valid 200 7d;
        add_header        Cache-Control "public, max-age=604800";
    }

    # SPA fallback: todas las rutas van al index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache de assets estáticos (Vite genera hashes en los nombres)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
